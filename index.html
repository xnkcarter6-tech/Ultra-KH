<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra KH</title>

<style>
:root{
    --blue:#1E50FF;
    --dark:#1f2937;
    --light:#f3f4f6;
    --white:#ffffff;
    --border:#d1d5db;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef2ff;
    display:flex;
    height:100vh;
}

.sidebar{
    width:240px;
    background:var(--blue);
    color:white;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.menu{
    list-style:none;
    padding:0;
    margin:0;
}

.menu li{
    padding:15px 20px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu li:hover,
.menu li.active{
    background:#143fd1;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    background:white;
    padding:15px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.content{
    flex:1;
    overflow:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

textarea,
input{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    margin-top:5px;
    margin-bottom:15px;
    font-size:14px;
}

button{
    background:var(--blue);
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.post{
    border:1px solid var(--border);
    border-radius:8px;
    padding:15px;
    margin-top:15px;
}

.chat-box{
    height:300px;
    overflow:auto;
    border:1px solid var(--border);
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    background:#f9fafb;
}

.message{
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
    background:#dbeafe;
}

.hidden{
    display:none;
}

.dark{
    background:#111827;
    color:white;
}

.dark .card,
.dark .topbar{
    background:#1f2937;
    color:white;
}

.dark textarea,
.dark input{
    background:#374151;
    color:white;
    border:1px solid #4b5563;
}

@media(max-width:768px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        flex-direction:row;
        overflow:auto;
    }

    .menu{
        display:flex;
        width:100%;
    }

    .menu li{
        border:none;
        white-space:nowrap;
        flex:1;
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="logo">Ultra KH</div>

    <ul class="menu">
        <li class="active" onclick="showPage('home',this)">Home</li>
        <li onclick="showPage('chat',this)">Chat</li>
        <li onclick="showPage('notify',this)">Notifications</li>
        <li onclick="showPage('profile',this)">Profile</li>
    </ul>

</div>

<div class="main">

    <div class="topbar">

        <div id="pageTitle">Home</div>

        <div>
            <button onclick="toggleDark()">Dark Mode</button>
        </div>

    </div>

    <div class="content">

        <!-- HOME -->
        <div id="homePage">

            <div class="card">

                <h2>Create Post</h2>

                <textarea id="postInput" placeholder="Write something..."></textarea>

                <button onclick="addPost()">Publish</button>

            </div>

            <div class="card">

                <h2>Latest Posts</h2>

                <div id="postList"></div>

            </div>

        </div>

        <!-- CHAT -->
        <div id="chatPage" class="hidden">

            <div class="card">

                <h2>Chat Box</h2>

                <div class="chat-box" id="chatBox"></div>

                <input type="text" id="chatInput" placeholder="Type message...">

                <button onclick="sendMessage()">Send</button>

            </div>

        </div>

        <!-- NOTIFICATIONS -->
        <div id="notifyPage" class="hidden">

            <div class="card">

                <h2>Notifications</h2>

                <ul id="notifyList">
                    <li>System running normally</li>
                    <li>Welcome to Ultra KH</li>
                </ul>

            </div>

        </div>

        <!-- PROFILE -->
        <div id="profilePage" class="hidden">

            <div class="card">

                <h2>Profile</h2>

                <label>Username</label>

                <input type="text" id="username" value="Admin">

                <button onclick="saveProfile()">Save</button>

            </div>

        </div>

    </div>

</div>

<script>

function showPage(page, element){

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("chatPage").classList.add("hidden");
    document.getElementById("notifyPage").classList.add("hidden");
    document.getElementById("profilePage").classList.add("hidden");

    document.querySelectorAll(".menu li").forEach(item=>{
        item.classList.remove("active");
    });

    element.classList.add("active");

    if(page === "home"){
        document.getElementById("homePage").classList.remove("hidden");
        document.getElementById("pageTitle").innerText = "Home";
    }

    if(page === "chat"){
        document.getElementById("chatPage").classList.remove("hidden");
        document.getElementById("pageTitle").innerText = "Chat";
    }

    if(page === "notify"){
        document.getElementById("notifyPage").classList.remove("hidden");
        document.getElementById("pageTitle").innerText = "Notifications";
    }

    if(page === "profile"){
        document.getElementById("profilePage").classList.remove("hidden");
        document.getElementById("pageTitle").innerText = "Profile";
    }
}

function addPost(){

    let text = document.getElementById("postInput").value;

    if(text.trim() === ""){
        alert("Please write something");
        return;
    }

    let post = document.createElement("div");

    post.className = "post";

    post.innerHTML = `
        <strong>Admin</strong>
        <p>${text}</p>
    `;

    document.getElementById("postList").prepend(post);

    document.getElementById("postInput").value = "";
}

function sendMessage(){

    let input = document.getElementById("chatInput");

    let text = input.value;

    if(text.trim() === ""){
        return;
    }

    let msg = document.createElement("div");

    msg.className = "message";

    msg.innerText = text;

    document.getElementById("chatBox").appendChild(msg);

    input.value = "";

    document.getElementById("chatBox").scrollTop =
    document.getElementById("chatBox").scrollHeight;
}

function saveProfile(){

    let name = document.getElementById("username").value;

    alert("Profile saved: " + name);
}

function toggleDark(){

    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
